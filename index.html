<!DOCTYPE html> 
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Tree Game</title>

    <!-- Link to CSS -->
     <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="game-container"> <!-- This is the game window-->
        <h1>Decorate the Tree!</h1>

        <!-- Tree image goes here-->
        <img id="tree" src="assets/prettytree.png" alt="Christmas Tree">

        <!--Ornaments wrapper-->
        <img id="ornament1" class="ornament" src="assets/ornament1.jpg" style="top:200px; left:20px;">
        <img id="ornament2" class="ornament" src="assets/ornament2.jpg" style="top:200px; left:80px;">
        <img id="ornament3" class="ornament" src="assets/ornament3.jpg" style="top:200px; left:140px;">

    </div>

    <!-- Link to JS-->
     <script src="script.js"></script>

</body>
</html>
